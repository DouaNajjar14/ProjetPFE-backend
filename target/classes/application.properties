spring.application.name=gestion-des-stagiaires
# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_stagiaires
spring.datasource.username=ahmed
spring.datasource.password=ahmed
spring.datasource.driver-class-name=org.postgresql.Driver
spring.session.jdbc.initialize-schema=always
# Run data.sql after Hibernate DDL to fix stale CHECK constraints
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# JWT Configuration
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000
# Server Configuration
server.port=8086
# Multipart file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
# n8n Webhooks
app.n8n.enabled=true
app.n8n.webhook.confirmation-candidature=http://localhost:5678/webhook-test/confirmation-candidature
app.n8n.webhook.statut-candidature=http://localhost:5678/webhook-test/statut-candidature
# Token shared between n8n and backend (change in production!)
app.n8n.api-token=ooredoo-n8n-secret-2026
# Frontend URL (for redirections)
app.frontend.url=http://localhost:4200